<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CronosMind - Inicio</title>
    <!-- Redirección automática al dashboard -->
    <meta http-equiv="refresh" content="0; url=dashboard.html">
    <!-- Enlaces necesarios para el precargado -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; color: white;">
        <div style="text-align: center;">
            <h1 style="color: #2563eb;">CronosMind</h1>
            <p>Cargando sistema de disciplina personal...</p>
            <div style="width: 50px; height: 50px; border: 3px solid #2563eb; border-top-color: transparent; border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite;"></div>
        </div>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <!-- Precargar datos esenciales -->
    <script src="js/main.js"></script>
    <script>
        // Inicializar sistema inmediatamente
        document.addEventListener('DOMContentLoaded', () => {
            window.cronosMind = new CronosMind();
            // La redirección ocurre automáticamente
        });
    </script>
</body>
</html>
